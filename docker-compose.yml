version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cutto_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: cutto_redis
    restart: always
    ports:
      - "6379:6379"
    
  app:
    build: .
    container_name: cutto_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/Cutto/app           
      - ./logs:/Cutto/logs
    depends_on:
      - db
      - redis
    
volumes:
  postgres_data: 
